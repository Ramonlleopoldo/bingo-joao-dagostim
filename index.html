<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabarito de Bingo Profissional - 75 Números</title>
    <style>
        :root {
            --primary: #2563eb;
            --header-color: #1e40af;
            --bg: #f8fafc;
            --cell-bg: #ffffff;
            --cell-border: #cbd5e1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        h1 {
            color: #334155;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Container do Painel */
        .bingo-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            border: 4px solid var(--primary);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Cabeçalho B I N G O */
        .bingo-header {
            display: grid;
            grid-template-columns: repeat(5, 80px);
            gap: 10px;
            margin-bottom: 5px;
        }

        .letter {
            font-size: 2.5rem;
            font-weight: 900;
            text-align: center;
            color: var(--header-color);
        }

        /* Grade de 15 linhas por 5 colunas */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 80px);
            /* 5 colunas (B I N G O) */
            grid-template-rows: repeat(15, 45px);
            /* 15 linhas de números */
            gap: 8px;
        }

        .cell-input {
            width: 80px;
            height: 45px;
            border: 2px solid var(--cell-border);
            border-radius: 6px;
            text-align: center;
            font-size: 1.4rem;
            font-weight: bold;
            color: #334155;
            outline: none;
            transition: all 0.2s;
            background-color: var(--cell-bg);
        }

        /* Efeito ao focar no campo */
        .cell-input:focus {
            border-color: var(--primary);
            background-color: #eff6ff;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        /* Efeito quando o número é preenchido */
        .cell-input:not(:placeholder-shown) {
            background-color: var(--primary);
            color: white;
            border-color: var(--header-color);
        }

        .controls {
            margin-top: 25px;
            display: flex;
            gap: 15px;
        }

        button {
            padding: 12px 25px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: transform 0.1s, opacity 0.2s;
        }

        .btn-clear {
            background: #ef4444;
            color: white;
        }

        .btn-full {
            background: #10b981;
            color: white;
        }

        button:hover {
            opacity: 0.9;
        }

        button:active {
            transform: scale(0.95);
        }

        /* Esconde setas do input number */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        @media print {
            .controls {
                display: none;
            }
        }
    </style>
</head>

<body>

    <h1>Gabarito bingo João Dagostim</h1>

    <div class="bingo-card">
        <div class="bingo-header">
            <div class="letter">B</div>
            <div class="letter">I</div>
            <div class="letter">N</div>
            <div class="letter">G</div>
            <div class="letter">O</div>
        </div>
        <div class="grid-container" id="gabaritoGrid">
        </div>
    </div>

    <div class="controls">
        <button class="btn-clear" onclick="limparTudo()">Limpar Painel</button>
        <button class="btn-full" onclick="toggleFullScreen()">Tela Cheia</button>
    </div>

    <script>
        const grid = document.getElementById('gabaritoGrid');

        // Definição dos intervalos por coluna
        const ranges = [
            { l: 'B', min: 1, max: 15 },
            { l: 'I', min: 16, max: 30 },
            { l: 'N', min: 31, max: 45 },
            { l: 'G', min: 46, max: 60 },
            { l: 'O', min: 61, max: 75 }
        ];

        function montarGabarito() {
            // Criamos 15 linhas
            for (let row = 0; row < 15; row++) {
                // Em cada linha, passamos pelas 5 colunas (B, I, N, G, O)
                for (let col = 0; col < 5; col++) {
                    const input = document.createElement('input');
                    input.type = 'number';
                    input.className = 'cell-input';
                    input.placeholder = "-";

                    const config = ranges[col];

                    // Validação de intervalo ao sair do campo (blur) ou mudar
                    input.addEventListener('change', function () {
                        const val = parseInt(this.value);
                        if (val < config.min || val > config.max) {
                            alert(`Erro: Na coluna ${config.l}, digite números entre ${config.min} e ${config.max}.`);
                            this.value = '';
                        }
                    });

                    grid.appendChild(input);
                }
            }
        }

        function limparTudo() {
            if (confirm("Deseja apagar todas as pedras do gabarito?")) {
                document.querySelectorAll('.cell-input').forEach(el => el.value = '');
            }
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        montarGabarito();
    </script>
</body>

</html>
